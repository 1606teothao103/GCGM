<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baccarat</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --accent-mom: #f43f5e;
            --accent-baby: #10b981;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            width: 100%;
            max-width: 500px;
            border: 1px solid #334155;
        }

        h2 {
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            background: linear-gradient(to right, var(--accent-baby), var(--primary), var(--accent-mom));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1.2fr 1.2fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .input-box {
            background: #0f172a;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #334155;
            transition: 0.3s;
        }

        .input-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 10px rgba(56, 189, 248, 0.2);
        }

        label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        input {
            width: 90%;
            background: transparent;
            border: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        /* Nút bấm */
        .btn-group {
            display: flex;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s ease;
            text-transform: uppercase;
        }

        .btn-nhap {
            background: #334155;
            color: #cbd5e1;
        }

        .btn-nhap:hover { background: #475569; }

        .btn-batdau {
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .btn-batdau:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.6);
        }

        /* Kết quả */
        #result-display {
            margin-top: 30px;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 22px;
            font-weight: 900;
            background: #020617;
            border: 2px dashed #1e293b;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.5s;
        }

        .winner-mom { color: var(--accent-mom); text-shadow: 0 0 15px rgba(244, 63, 94, 0.5); border-color: var(--accent-mom) !important; }
        .winner-baby { color: var(--accent-baby); text-shadow: 0 0 15px rgba(16, 185, 129, 0.5); border-color: var(--accent-baby) !important; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cái & Con</h2>

    <div class="grid-3">
        <div class="input-box">
            <label>STT</label>
            <input type="number" id="stt" value="1">
        </div>
        <div class="input-box">
            <label>Cái</label>
            <input type="number" id="ga_me" value="0">
        </div>
        <div class="input-box">
            <label>Con</label>
            <input type="number" id="ga_con" value="0">
        </div>
    </div>

    <div class="grid-2">
        <div class="input-box" style="border-left: 4px solid var(--accent-baby);">
            <label style="color: var(--accent-baby);">Điểm Con</label>
            <input type="number" id="tp_con" value="0">
        </div>
        <div class="input-box" style="border-right: 4px solid var(--accent-mom);">
            <label style="color: var(--accent-mom);">Điểm Cái</label>
            <input type="number" id="tp_me" value="0">
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-nhap" onclick="handleNhap()">NHẬP</button>
        <button class="btn-batdau" onclick="handleTinh()">BẮT ĐẦU</button>
    </div>

    <div id="result-display">CHỜ TÍNH TOÁN...</div>
</div>

<script>
    const elSTT = document.getElementById('stt');
    const elGaMe = document.getElementById('ga_me');
    const elGaCon = document.getElementById('ga_con');
    const elTpMe = document.getElementById('tp_me');
    const elTpCon = document.getElementById('tp_con');
    const elResult = document.getElementById('result-display');

    function handleNhap() {
        let stt = parseInt(elSTT.value);
        let gaMe = parseInt(elGaMe.value);
        let gaCon = parseInt(elGaCon.value);
        let tpMe = parseInt(elTpMe.value);
        let tpCon = parseInt(elTpCon.value);

        // Nhảy STT
        elSTT.value = stt + 1;

        // Nhảy Gà Mẹ/Con dựa trên tâm điểm
        if (tpCon > tpMe) {
            elGaCon.value = gaCon + 1;
        } else if (tpMe > tpCon) {
            elGaMe.value = gaMe + 1;
        }

        elResult.innerText = "ĐÃ NHẬP DỮ LIỆU";
        elResult.className = "";
    }

    function handleTinh() {
        let stt = parseInt(elSTT.value);
        let gaMe = parseInt(elGaMe.value);
        let gaCon = parseInt(elGaCon.value);
        let tpMe = parseInt(elTpMe.value);
        let tpCon = parseInt(elTpCon.value);

        let tong = 0;
        
        // Công thức logic
        if (tpCon > tpMe) {
            tong = stt + tpCon + tpMe + gaCon;
        } else if (tpMe > tpCon) {
            tong = stt + tpCon + tpMe + gaMe;
        } else {
            tong = stt + tpCon + tpMe; 
        }

        // Kiểm tra Chẵn Lẻ
        if (tong % 2 === 0) {
            elResult.innerText = "CON";
            elResult.className = "winner-baby";
        } else {
            elResult.innerText = "CÁI";
            elResult.className = "winner-mom";
        }
    }
</script>

</body>
</html>
